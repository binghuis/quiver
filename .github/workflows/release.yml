name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
            arch: aarch64
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            arch: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Extract release notes
        id: notes
        run: |
          {
            echo 'body<<RELEASE_EOF'
            awk '/^## / { if (seen) exit; seen=1 } seen' CHANGELOG.md
            echo ''
            echo '## 安装'
            echo ''
            echo '- Apple Silicon (M1/M2/M3/M4)：下载 `Quiver_*_aarch64.dmg`'
            echo '- Intel Mac：下载 `Quiver_*_x64.dmg`'
            echo ''
            echo '首次打开如提示「已损坏，无法打开」，在终端执行：'
            echo ''
            echo '```bash'
            echo 'xattr -cr /Applications/Quiver.app'
            echo '```'
            echo ''
            echo '（未做 Apple 公证，开源项目常规绕过方式。）'
            echo RELEASE_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Quiver ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
